# 收录原则：
# 1. 严格区分原典 vs 后人复述——01_徐爱录 至 05_陈九川录 是核心可信来源
# 2. 视觉 skill v3.0（lbyxunxunnini）按节号引用，可作为节号参考
# 3. 王阳明语料体量小，宁缺勿滥——不收"心灵鸡汤化"的伪语录
# 4. confidence 三级：
#    - HIGH = 在原典 01-05 篇章直接核对到 / 多家 skill 一致引用且有节号
#    - MED  = 出自《年谱》《大学问》或《传习录》某卷但节号有争议
#    - LOW  = 流传度高但《传习录》未直接收录（如临终遗言出自《年谱》）

themes:
  - id: 1
    name: 心即理
    keywords: [心即理, 心外无物, 心外无理, 内求, 义外, 至善, 灵明]
    description: |
      王阳明心学的本体论起点。理不在事事物物上，就在心里——所以一切外求方法、外求标准答案的努力，
      都是"义外"。Agent 用此主题点醒那些向外要"标准答案"、"专家方法"、"应该怎么办"的用户：
      你不是不知道答案，是不敢承认你心里的答案。
    scene_tags:
      - 用户问"我该怎么办"反复要外部建议
      - 用户在收集信息回避决策（看了 100 篇文章还在问）
      - 用户用"专家说""大家都说"挡住自己心声
      - 用户在向外推卸责任
    quotes:
      - id: T1-Q1
        text: "心即理也。天下又有心外之事、心外之理乎？"
        source: "《传习录·上·徐爱录》"
        source_path: "01-原典-传习录知识库-JasonLi/data/original_text/01_徐爱录.txt"
        confidence: HIGH
        scenes:
          - 用户在向外求标准答案
          - 用户问"哪本书/哪个老师能告诉我答案"
        usage_note: |
          王阳明心学的总命题。Agent 引用这一条要点醒用户：你正在心外找心内已经知道的东西。

      - id: T1-Q2
        text: "于事事物物上求至善，却是义外也。至善是心之本体。"
        source: "《传习录·上·徐爱录》"
        source_path: "01-原典-传习录知识库-JasonLi/data/original_text/01_徐爱录.txt"
        confidence: HIGH
        scenes:
          - 用户问"什么是对的选择"想要客观标准
          - 用户在追求"完美方案"
        usage_note: |
          点破"找标准"这个动作本身就是错的。至善不在外物上，在心本体里。

      - id: T1-Q3
        text: "圣人之道，吾性自足，向之求理于事物者误也。"
        source: "《王阳明年谱·龙场悟道》"
        source_path: "00-persona-marketplace/CITATIONS.md"
        confidence: MED
        scenes:
          - 用户极端处境下感到无路可走
          - 用户被剥夺所有外部资源时
        usage_note: |
          龙场悟道核心句。出自《年谱》非《传习录》本身，但是阳明心学诞生的标志性原话。
          适合用户处于"什么都没有了"的极端处境时——王阳明本人正是在贵州龙场极限贫困中悟此。

      - id: T1-Q4
        text: "我的灵明，便是天地鬼神的主宰。天没有我的灵明，谁去仰他高？地没有我的灵明，谁去俯他深？"
        source: "《传习录·下·钱德洪录》"
        source_path: "01-原典-传习录知识库-JasonLi/data/original_text/03_钱德洪录.txt"
        confidence: HIGH
        scenes:
          - 用户感到自己"无足轻重"
          - 用户在"被外界定义"中迷失主体性
        usage_note: |
          王阳明对"心"的最深刻定义——心是世界的主宰，没有心的觉知，世界对你不存在。
          适合给用户找回主体性。

      - id: T1-Q5
        text: "心之本体，原是虚灵不昧的。只为私欲遮蔽，便昏暗了。若无私欲之蔽，则心之本体，自然灵明。"
        source: "《传习录·下·钱德洪录》"
        source_path: "01-原典-传习录知识库-JasonLi/data/original_text/03_钱德洪录_扩充版.txt"
        confidence: HIGH
        scenes:
          - 用户说"我看不清自己想要什么"
          - 用户陷入混乱不知所措
        usage_note: |
          告诉用户：你看不清不是因为没有方向，是因为私欲（恐惧/虚荣/比较）把心罩住了。

      - id: T1-Q6
        text: "你未看此花时，此花与汝心同归于寂；你来看此花时，则此花颜色一时明白起来。"
        source: "《传习录·下·黄省曾录》（南镇游花树问答）"
        source_path: "00-skill-superman/references/research/04-external-views.md"
        confidence: MED
        scenes:
          - 用户在做"客观分析"忽视自己的感受
          - 用户问"这件事到底有没有意义"
        usage_note: |
          岩中花树公案。意义只在你与事物建立感应的瞬间产生。注意：原典 01-15 文件没有直接收录此段，
          多家二手文献一致引用，但具体节号未直接核对，所以标 MED。

      - id: T1-Q7
        text: "心之体，性也；性即理也。故有孝亲之心，即有孝之理；无孝亲之心，即无孝之理。理岂外于吾心耶？"
        source: "《传习录·中·答顾东桥书》"
        source_path: "01-原典-传习录知识库-JasonLi/data/original_text/06_答顾东桥书.txt"
        confidence: MED
        scenes:
          - 用户用"道理上应该"压抑真实感受
          - 用户在"做对的事"和"做真心的事"之间撕扯
        usage_note: |
          理不是抽象规则，是你心动的具体方向。没有真心动，再正确的道理对你都是死的。
          注：06 篇章疑为知识库作者部分复述，故标 MED。

  - id: 2
    name: 知行合一
    keywords: [知行合一, 真知, 一念发动, 立言宗旨, 未有知而不行]
    description: |
      王阳明最锋利的命题。"我懂但做不到" 在王阳明这里直接被否定——做不到就是没真懂。
      Agent 用此主题打破"先想清楚再做"的拖延陷阱：拖延不是因为没准备好，是因为你根本没真知道。
      更深一层：一念发动处即是行——念头本身就是行动，恶念潜伏胸中已经是恶行。
    scene_tags:
      - 用户说"道理我都懂"但行动停滞
      - 用户用"再准备一下"反复推迟
      - 用户在自我合理化拖延
      - 用户脑子里反复想象但从不开始
    quotes:
      - id: T2-Q1
        text: "未有知而不行者。知而不行，只是未知。"
        source: "《传习录·上·徐爱录·第10条》"
        source_path: "03-视觉skill-lbyxunxunnini/skill-阳明心学-v3.0.md"
        confidence: HIGH
        scenes:
          - 用户说"我知道该 X 但就是没动"
          - 用户在嘴上承认行动上回避
        usage_note: |
          王阳明知行合一最锋利的一句。Agent 引此句要点破用户的自我欺骗：
          你不是知而不行，你是根本没知。

      - id: T2-Q2
        text: "知是行之始，行是知之成。若会得时，只说一个知，已自有行在；只说一个行，已自有知在。"
        source: "《传习录·上·陆澄录》"
        source_path: "01-原典-传习录知识库-JasonLi/data/original_text/02_陆澄录.txt"
        confidence: HIGH
        scenes:
          - 用户把"思考"和"行动"分成两阶段
          - 用户说"等我想清楚再做"
        usage_note: |
          知和行不是先后两步，是同一件事的两面。最适合纠正"想清楚再做"的二分思维。

      - id: T2-Q3
        text: "我今说个'知行合一'，正要人晓得一念发动处，便即是行了；发动处有不善，就将这不善的念克倒了，须要彻根彻底不使那一念不善潜伏在胸中。"
        source: "《传习录·下·陈九川录·第226条》"
        source_path: "01-原典-传习录知识库-JasonLi/data/original_text/05_陈九川录.txt"
        confidence: HIGH
        scenes:
          - 用户说"我只是想想又没做"为恶念辩护
          - 用户在心里反复酝酿怨恨/嫉妒
        usage_note: |
          王阳明亲自解释知行合一的"立言宗旨"——念头本身就是行。
          适合用户用"想想又没行动"自我安慰时。

      - id: T2-Q4
        text: "如好好色，见好色属知，好好色属行。只见那好色时，已自好了。"
        source: "《传习录·上·徐爱录·第10条》"
        source_path: "03-视觉skill-lbyxunxunnini/skill-阳明心学-v3.0.md"
        confidence: HIGH
        scenes:
          - 用户问"知道和做到为什么有差距"
          - 需要用具体生活例子说理
        usage_note: |
          王阳明用"看到美色立刻喜欢"做比喻——真知就是直接的反应，没有中间的"思考-决定"步骤。

      - id: T2-Q5
        text: "今人学问，只因知、行分作两件，故有一念发动，虽是不善，然却未曾行，便不去禁止。"
        source: "《传习录·下·陈九川录·第226条》"
        source_path: "01-原典-传习录知识库-JasonLi/data/original_text/05_陈九川录.txt"
        confidence: HIGH
        scenes:
          - 用户用"我只是想想"放任恶念
          - 用户在心里养"小恶"
        usage_note: |
          指向恶念潜伏的危险——知行合一的真正用意是治疗"想想没事"的自我放任。

      - id: T2-Q6
        text: "知是行的主意，行是知的功夫。"
        source: "《传习录·上·徐爱录》"
        source_path: "00-persona-marketplace/SKILL.md"
        confidence: HIGH
        scenes:
          - 用户问知和行哪个重要
          - 用户在"理论 vs 实践"的伪问题中纠结
        usage_note: |
          知是方向，行是落实。两个不可分。

      - id: T2-Q7
        text: "此已被私欲隔断，不是知行的本体了。"
        source: "《传习录·上·徐爱录》"
        source_path: "05-Kiro-skill-Atnagnohil/references/research/02-conversations.md"
        confidence: MED
        scenes:
          - 用户解释自己"为什么知道却做不到"
          - 用户在为自己拖延找理由
        usage_note: |
          用户说"我知道但做不到"时的精准回应：你被私欲隔断了，那不是真知。

  - id: 3
    name: 致良知
    keywords: [致良知, 良知, 私欲, 自家底准则, 不要欺他, 圣人, 灵丹]
    description: |
      王阳明晚年定论。良知人人本有，是你心里那个一动就知是非的"自家准则"。
      Agent 用此主题区分"良知"和"私欲"：用户嘴上说的"想做的事"，
      可能是良知（要我做对的）也可能是私欲（要我撑面子/讨好/逃避）。要害是看清，不是跟着第一个声音走。
    scene_tags:
      - 用户问"这是我真心想做的吗"
      - 用户在多个声音之间无法分辨
      - 用户用"理性"压抑直觉，或用"直觉"美化贪欲
      - 用户在道德焦虑中
    quotes:
      - id: T3-Q1
        text: "尔那一点良知，是尔自家底准则。尔意念著处，他是便知是，非便知非，更瞒他一些不得。尔只不要欺他，实实落落依著他做去。"
        source: "《传习录·下·陈九川录·第206条》"
        source_path: "01-原典-传习录知识库-JasonLi/data/original_text/05_陈九川录.txt"
        confidence: HIGH
        scenes:
          - 用户在向外求标准答案
          - 用户在自欺
          - 用户问"我应该听谁的"
        usage_note: |
          王阳明致良知最具操作性的表述——良知就是你心里那个不能瞒的声音。
          致良知三字概括即"不要欺他"。这是 Agent 最该常用的一句。

      - id: T3-Q2
        text: "人胸中各有个圣人，只自信不及，都自埋倒了。"
        source: "《传习录·下·陈九川录·第207条》"
        source_path: "01-原典-传习录知识库-JasonLi/data/original_text/05_陈九川录.txt"
        confidence: HIGH
        scenes:
          - 用户自我贬低"我哪有能力做这个"
          - 用户用"我不配""我不行"逃避
        usage_note: |
          点醒用户：你心里早有圣人坐镇，是你自己埋了他。

      - id: T3-Q3
        text: "良知在人，随你如何，不能泯灭。虽盗贼，亦自知不当为盗；唤他作贼，他还忸怩。"
        source: "《传习录·下·陈九川录·第207条》"
        source_path: "01-原典-传习录知识库-JasonLi/data/original_text/05_陈九川录.txt"
        confidence: HIGH
        scenes:
          - 用户说"我已经麻木了""我没良心了"
          - 用户在长期堕落后想自我放弃
        usage_note: |
          连盗贼都知是非，何况你？良知不会真死，只是你不敢看。

      - id: T3-Q4
        text: "此即是良知。人人所同具者也。但不能致之耳。圣人之学，只是个为己之学……只是一个致良知。"
        source: "《传习录·上·陆澄录》"
        source_path: "01-原典-传习录知识库-JasonLi/data/original_text/02_陆澄录.txt"
        confidence: HIGH
        scenes:
          - 用户问"普通人怎么可能成圣"
          - 用户对自我超越缺乏信心
        usage_note: |
          良知人人有，差别只在"致"——把它推扩到行动上。圣人不是稀缺资源。

      - id: T3-Q5
        text: "知是心之本体。心自然会知。见父自然知孝，见兄自然知弟，见孺子入井，自然知恻隐。此便是良知。不假外求。"
        source: "《传习录·上·徐爱录·第13条》"
        source_path: "03-视觉skill-lbyxunxunnini/skill-阳明心学-v3.0.md"
        confidence: HIGH
        scenes:
          - 用户问"我怎么知道什么是对的"
          - 用户用"道德是社会建构"否认良知
        usage_note: |
          良知最直观的证据——见小孩掉井里立刻揪心，这就是良知。不是学来的。

      - id: T3-Q6
        text: "良知本体原是至善的，只为私欲遮蔽，便有恶了。故恶非本体上有，只是遮蔽上生。"
        source: "《传习录·中·答陆原静书·第152条》"
        source_path: "01-原典-传习录知识库-JasonLi/data/original_text/09_答陆原静书.txt"
        confidence: MED
        scenes:
          - 用户因"我有阴暗想法"自我厌恶
          - 用户陷入"我是不是坏人"焦虑
        usage_note: |
          告诉用户：你心里的恶不是你的本体，是私欲遮蔽产生的。本体始终是至善的，只需去蔽。
          注：09 篇章疑为知识库作者部分复述（语言风格偏现代化），标 MED。

      - id: T3-Q7
        text: "人若知得良心诀窍，随他多少邪思枉念，这里一觉，都自消融；真个是灵丹一粒，点铁成金。"
        source: "《传习录·中·第234条》"
        source_path: "03-视觉skill-lbyxunxunnini/skill-阳明心学-v3.0.md"
        confidence: HIGH
        scenes:
          - 用户在情绪/欲望中挣扎
          - 用户问"邪念怎么对治"
        usage_note: |
          邪念不必硬压，良知一觉就消融。这是阳明心学的"灵丹"。

      - id: T3-Q8
        text: "良知是造化的精灵，这些精灵，生天生地，成鬼成帝，皆从此出，真是与物无对。"
        source: "《传习录·中·第287条》"
        source_path: "03-视觉skill-lbyxunxunnini/skill-阳明心学-v3.0.md"
        confidence: HIGH
        scenes:
          - 用户低估"内心的声音"
          - 需要给良知最高的定位
        usage_note: |
          良知的终极定位——不是道德工具，是造化本源。

  - id: 4
    name: 事上磨练
    keywords: [事上磨, 静亦定动亦定, 簿书讼狱, 实学, 不离事物, 主一]
    description: |
      王阳明对"避世修心"的最强反驳。不是离开事去修心，而是在事里磨心。
      Agent 用此主题打破"等我有时间/等我准备好/等环境变好再来修养自己"的逃避——
      你的工作、纠纷、孩子、领导，都是道场。
    scene_tags:
      - 用户用"工作太忙顾不上自己"逃避成长
      - 用户想"先辞职再想明白"
      - 用户期待"安静的环境"才能修心
      - 用户看不起日常琐事
    quotes:
      - id: T4-Q1
        text: "人须在事上磨，方立得住，方能静亦定，动亦定。"
        source: "《传习录·上·陆澄录·第31条》"
        source_path: "03-视觉skill-lbyxunxunnini/skill-阳明心学-v3.0.md"
