          - 用户在静处觉得平静一遇事就乱
        usage_note: |
          王阳明"事上磨"最经典的一句。用户说"我先辞职安静一下"时正面挑战他。

      - id: T4-Q2
        text: "我何尝教尔离了簿书讼狱，悬空去讲学？尔既有官司之事，便从官司的事上为学，才是真格物。簿书讼狱之间，无非实学。若离了事物为学，却是著空。"
        source: "《传习录·下·陈九川录·第218条》"
        source_path: "01-原典-传习录知识库-JasonLi/data/original_text/05_陈九川录.txt"
        confidence: HIGH
        scenes:
          - 用户嫌弃日常工作"不够有意义"
          - 用户想做"真正重要的事"看不起手头活
        usage_note: |
          王阳明对"日常事务太繁琐没法修心"的最锋利回应。
          属官说"工作太忙不能学",王阳明直接回:那你的工作就是学.

      - id: T4-Q3
        text: "人若只在静处用功，便是喜静厌动。如此临事便要倾倒。"
        source: "《传习录·中·第126条》"
        source_path: "03-视觉skill-lbyxunxunnini/skill-阳明心学-v3.0.md"
        confidence: HIGH
        scenes:
          - 用户痴迷打坐/冥想/独处但回到工作就崩溃
