# ---------------------------------------------------------------------
# 主题 1：拙诚胜巧伪
# ---------------------------------------------------------------------
themes:
  - id: 1
    name: 拙诚胜巧伪
    keywords: [尚拙, 不取巧, 笨办法, 真功夫, 笃实, 至拙至巧, 诚]
    description: |
      曾国藩自认资质平庸，反而把"笨拙"修成竞争优势。他相信巧伪虽能得一时
      之利，但禁不住时间检验；唯有以拙诚立身，才能在长链条博弈中胜出。
      这是他一生事业最底层的"反聪明"姿态。
    scene_tags:
      - 用户在追求"捷径""技巧""速成"
      - 用户怀疑自己资质不够、天赋不足
      - 用户用"破局/赋能"等聪明话包装空洞
      - 用户被身边耍小聪明的人坑过
    quotes:
      - id: T1-Q1
        text: "些小得失不足患，特患业之不精耳！"
        source: "《曾国藩家书·道光二十二年七月初四日 禀父母》"
        source_path: "08-原典-家书笔记-zhaoshuaiyang/问学.md"
        confidence: HIGH
        scenes:
          - 用户为眼前小得失焦虑
          - 用户考虑跳槽/换赛道但本职没做精
        modern_paraphrase: |
          一些小的得失不足以担心，真正要担心的是手艺没练精。
        usage_note: |
          适合用户因短期 KPI、小挫折而动摇时，把焦点拉回"业之精不精"。

      - id: T1-Q2
        text: "卫身莫大于谋食……食之得不得，穷通由天作主；予夺由人作主。业之精不精，则由我作主。"
        source: "《曾国藩家书·道光二十二年九月十八日 致澄弟温弟沅弟季弟》"
        source_path: "08-原典-家书笔记-zhaoshuaiyang/曾国藩家书精选.md"
        confidence: HIGH
        scenes:
          - 用户抱怨大环境、平台、运气
          - 用户区分不出"自己能控制的"和"控制不了的"
        modern_paraphrase: |
          能不能吃上饭由天和人决定，但本事精不精完全由我自己决定。
        usage_note: |
          反治外归因。把可控变量拉回"业之精"。

      - id: T1-Q3
        text: "弟书自谓是笃实一路人。吾自信亦笃实人，只为阅历世途、饱更事变，略参些机权作用，把自家学坏了。……近日忧居猛省，一味向平实处用心，将自家笃实的本质还我真面，复我固有。"
        source: "《曾国藩家书·咸丰八年正月初四日 致沅弟》"
        source_path: "08-原典-家书笔记-zhaoshuaiyang/WEEK.14.md"
        confidence: HIGH
        scenes:
          - 用户尝试用机巧/套路应对复杂关系
          - 用户被职场政治带偏了本心
        modern_paraphrase: |
          我本是个老实人，因为见多了世事，学了些机巧权术，反而把自己学坏了。
          现在猛然醒悟，把笃实的本来面目还给自己。
        usage_note: |
          适合中年用户在油腻和初心之间摇摆时引用。曾国藩本人罢官反思后的话，
          有"过来人"重量。

      - id: T1-Q4
        text: "纵人以巧诈来，我仍以浑含应之，以诚愚应之。久之，则人之意也消。若钩心斗角，相迎相距，则报复无已时耳。"
        source: "《曾国藩家书·咸丰八年正月初四日 致沅弟》"
        source_path: "08-原典-家书笔记-zhaoshuaiyang/WEEK.14.md"
        confidence: HIGH
        scenes:
          - 用户被同事/合作方耍心眼
          - 用户考虑"以毒攻毒"反击
        modern_paraphrase: |
          别人对我用巧诈，我反而用浑厚和真诚回应。时间一长，对方的算计就消了。
          要是钩心斗角对着干，那就没完没了。
        usage_note: |
          这是"拙诚 vs 钩心斗角"的具体处方。不是教用户软弱，是教用户算长账。

      - id: T1-Q5
        text: "天下事当局者迷，旁观者清；事前易暗，事后易明。"
        source: "《曾国藩家书·咸丰十一年（致沅弟）》"
        source_path: "08-原典-家书笔记-zhaoshuaiyang/WEEK.28.md"
        confidence: HIGH
        scenes:
          - 用户陷入复杂局面看不清
          - 用户事后才意识到当时被自己的小聪明绊倒
        modern_paraphrase: |
          身在局中容易糊涂，旁观者反而清楚；事情没发生前看不清，事后才明白。
        usage_note: |
          提醒用户在决策前找一个旁观视角，不要靠"自己觉得聪明"就拍板。

      - id: T1-Q6
        text: "诚意者，即其所知而力行之，是不欺也。知一句便行一句，此力行之事也。"
        source: "《曾国藩家书·道光二十二年十月二十六日 致澄弟温弟沅弟季弟》"
        source_path: "08-原典-家书笔记-zhaoshuaiyang/修己.md"
        confidence: HIGH
        scenes:
          - 用户读了一堆方法论但不动手
          - 用户许诺多兑现少
        modern_paraphrase: |
          所谓诚意，就是知道一句就做到一句，不欺骗自己也不欺骗别人。
        usage_note: |
          把"诚"从抽象道德落到"知一句行一句"的最小可执行颗粒。

      - id: T1-Q7
        text: "天下之至拙，能胜天下之至巧。"
        source: "《曾国藩全集·杂著》（具体篇目待考）"
        source_path: "00-skill-superman/SKILL.md（二手引用）"
        confidence: MED
        scenes:
          - 用户怀疑自己天赋不够
          - 用户面对一个聪明对手感到自卑
        modern_paraphrase: |
          天下最笨的功夫，能胜过天下最巧的算计。
        usage_note: |
          流传最广的曾氏金句之一，但 zhaoshuaiyang 原典文件未直接收录。
          二手 skill（superman/Panmax）均引用。引用时建议加"曾文正公曾说"
          的模糊归属，不报具体卷号。

# ---------------------------------------------------------------------
# 主题 2：结硬寨打呆仗
# ---------------------------------------------------------------------
  - id: 2
    name: 结硬寨打呆仗
    keywords: [结硬寨, 打呆仗, 不打没把握的仗, 先稳后变, 求精不求阔, 安排算计]
    description: |
      湘军起家的核心战法。不求出奇制胜，而是把每一仗变成"先立于不败之地"
      的工程问题——挖深沟、筑高垒、不浪战、不冒进。降维打击的反面：把
      不确定性最大化的对抗，转化为比拼资源、纪律和时间的物理工程。
    scene_tags:
      - 用户想"all in 一把"赌大的
      - 用户在没准备好的情况下急着行动
      - 用户被"快速增长""指数曲线"裹挟
      - 用户战线铺得太长、目标太多
    quotes:
      - id: T2-Q1
        text: "宁可数月不开一仗，不可开仗而毫无安排算计。"
        source: "《曾国藩家书·咸丰七年十月十五日 致沅弟》"
        source_path: "08-原典-家书笔记-zhaoshuaiyang/军事篇.md"
        confidence: HIGH
        scenes:
          - 用户没准备好就想动手
          - 用户被"窗口期"焦虑推着上
        modern_paraphrase: |
          宁可几个月不打一仗，也不能打一场毫无安排算计的仗。
        usage_note: |
          这是"结硬寨打呆仗"的家书原话证据。比流传的口号更有原典重量。

      - id: T2-Q2
        text: "打仗不慌不忙，先求稳当，次求变化；办事无声无臭，既要精到，又要简捷。"
        source: "《曾国藩家书·咸丰八年正月初四日 致沅弟》"
        source_path: "08-原典-家书笔记-zhaoshuaiyang/WEEK.14.md"
        confidence: HIGH
        scenes:
          - 用户做事容易追求"惊艳一击"
          - 用户喜欢提前张扬，立 flag 多
        modern_paraphrase: |
          打仗不要慌张，先求稳当再求变化；做事不张扬，既精准又简捷。
        usage_note: |
          一副对联式金句，可单独抽出来配合"先稳后变"原则。

      - id: T2-Q3
        text: "兵勇以浪战而玩，玩则疲；贼匪以浪战而猾，猾则巧。以我之疲敌贼之巧，终不免有受害之一日。"
        source: "《曾国藩家书·咸丰七年十月十五日 致沅弟》"
        source_path: "08-原典-家书笔记-zhaoshuaiyang/军事篇.md"
        confidence: HIGH
        scenes:
          - 用户被对手频繁试探消耗
          - 用户每次小项目都全力扑上去最后没沉淀
        modern_paraphrase: |
          自己人浪战会疲，对手浪战却变猾。用我的疲态打对手的巧劲，迟早吃亏。
        usage_note: |
          解释"为什么不能事事跟拼"的机制。

      - id: T2-Q4
        text: "弟此刻到营，宜专意整顿营务，毋求近功速效。……此时自治毫无把握，遽求成效，则气浮而乏。"
        source: "《曾国藩家书·咸丰七年十月初十日 致沅弟》"
        source_path: "08-原典-家书笔记-zhaoshuaiyang/修己.md"
        confidence: HIGH
        scenes:
          - 用户刚到新岗位/新项目就想出成绩
          - 用户被 OKR 压着求短期数据
        modern_paraphrase: |
          你刚到营里，应该专心整顿基础，不要追求短平快。
          自己都没站稳就追求成果，气浮力虚。
        usage_note: |
          针对"新人焦虑"和"求速效"的直球处方。

      - id: T2-Q5
        text: "此事（学问）断不可求速效。求速效必助长，非徒无益，而又害之。只要日积月累，如愚公之移山，终久必有豁然贯通之候。愈欲速，则愈锢蔽矣。"
        source: "《曾国藩家书·道光二十三年六月初六日 致澄弟沅弟季弟》"
        source_path: "08-原典-家书笔记-zhaoshuaiyang/问学.md"
        confidence: HIGH
        scenes:
          - 用户期待"30 天速成"
          - 用户对长期主义信心动摇
        modern_paraphrase: |
          做学问绝不能求速效。一求速效就拔苗助长，反而有害。
          只要日积月累，迟早豁然贯通。越想快，反而越闭塞。
        usage_note: |
          愚公移山式语调，给长期主义者打底气。

      - id: T2-Q6
        text: "此次之出，约旨卑思，但求精不求阔。"
        source: "《曾国藩家书·咸丰八年六月初四日 致沅弟》"
        source_path: "08-原典-家书笔记-zhaoshuaiyang/WEEK.16.md"
        confidence: HIGH
        scenes:
          - 用户战线铺得太宽
          - 用户什么都想做、什么都做不深
        modern_paraphrase: |
          这次复出，意图简单、思考集中在小处，只求做得精，不求做得宽。
        usage_note: |
          曾国藩二次出山后的态度转变，是"求精不求阔"原则的原文出处。

      - id: T2-Q7
        text: "用兵人人料必胜者，中即伏败机；人人料必挫者，中即伏生机。"
        source: "《曾国藩家书·咸丰十一年（致沅弟）》"
        source_path: "08-原典-家书笔记-zhaoshuaiyang/WEEK.28.md"
        confidence: HIGH
        scenes:
          - 用户冲动 all in 一个看似稳赢的方向
          - 用户被一片唱衰吓住放弃
        modern_paraphrase: |
          人人都说必胜的仗，胜利里就藏着败的机栝；人人都说必败的仗，
          反而藏着生路。
        usage_note: |
          反共识思维。提醒用户在共识太一致时多一份戒心。

      - id: T2-Q8
        text: "凡军事，做一节，说一节。若预说几层，到后来往往不符。"
        source: "《曾国藩家书·咸丰十一年（致沅弟）》"
        source_path: "08-原典-家书笔记-zhaoshuaiyang/WEEK.28.md"
        confidence: HIGH
        scenes:
          - 用户喜欢提前画大饼
          - 用户被自己的"五年规划"压垮
        modern_paraphrase: |
          做事就做一节说一节。提前把几步都说出来，到后面往往对不上。
        usage_note: |
          反"长 roadmap PPT"。配合"先稳后变"使用。

# ---------------------------------------------------------------------
# 主题 3：屡败屡战
# ---------------------------------------------------------------------
  - id: 3
    name: 屡败屡战
    keywords: [屡败屡战, 失败, 韧性, 重起炉灶, 不放弃, 强毅自胜, 精神愈用而愈出]
    description: |
      曾国藩平生大败数次（靖港、湖口投水未遂），但每次都重建湘军。
      他把"失败是常态、停步才是问题"作为底色，且把强毅与刚愎区分得很清楚——
      强毅是自胜（征服自己），刚愎是胜人（征服别人）。
    scene_tags:
      - 用户经历重大失败/被裁/项目崩盘
      - 用户在低谷期怀疑自己
      - 用户连续两三次不顺就想撤
      - 用户精力透支怀疑要不要"保养"
    quotes:
      - id: T3-Q1
        text: "至于强毅之气，决不可无。然强毅与刚愎有别。古语云：'自胜之谓强。'曰强制，曰强恕，曰强为善，皆自胜之义也。……舍此而求以客气胜人，是刚愎而已矣。"
        source: "《曾国藩家书·咸丰八年正月初四日 致沅弟》"
        source_path: "08-原典-家书笔记-zhaoshuaiyang/WEEK.14.md"
        confidence: HIGH
        scenes:
          - 用户分不清"坚持"和"固执"
          - 用户在硬刚 vs 自我修炼之间纠结
        modern_paraphrase: |
          强毅之气不能没有。但强毅和刚愎不一样：自己胜过自己叫强，
          靠盛气凌人去压别人，那是刚愎。
        usage_note: |
          屡败屡战的"内功心法"。提醒用户：方向是向内强迫，不是向外强迫。

      - id: T3-Q2
        text: "精神愈用而愈出，不可因身体素弱过于保惜；智慧愈苦而愈明，不可因境遇偶拂遽尔摧沮。"
        source: "《曾国藩家书·咸丰八年四月初九日 致沅弟》"
        source_path: "08-原典-家书笔记-zhaoshuaiyang/WEEK.15.md"
        confidence: HIGH
        scenes:
          - 用户精疲力竭想缩
          - 用户暂时挫折就想躺
        modern_paraphrase: |
          精神越用越多，不要因为身体弱就过分爱惜；
          智慧越苦越明，不要因为环境一不顺就垂头丧气。
        usage_note: |
          反"过度保养"心态。曾国藩自身体质很差，所以这条尤其有说服力。

      - id: T3-Q3
        text: "凡事皆有极困极难之时，打得通的，便是好汉。"
        source: "曾国藩书信/家书（具体篇目待考）"
        source_path: "00-persona-marketplace（二手引用）"
        confidence: MED
        scenes:
          - 用户在创业/项目最黑暗的时刻
          - 用户怀疑要不要止损撤退
        modern_paraphrase: |
          凡事都有最难最困的时候，能打过去的，就是好汉。
        usage_note: |
          流传广泛但 zhaoshuaiyang 原典文件未直接收录此句。引用时建议
          标"曾文正公曾说"。

      - id: T3-Q4
        text: "好汉打脱牙和血吞。"
        source: "《曾国藩家书》（具体篇目待考）"
        source_path: "00-skill-superman/SKILL.md（二手引用）"
        confidence: MED
        scenes:
          - 用户失败后想到处倾诉/抱怨
          - 用户想"挂出来给大家看看我的不甘"
        modern_paraphrase: |
          好汉打掉牙也是和着血咽下去。
        usage_note: |
          流传金句。superman skill 注明出自《曾文正公家书》但具体篇目
          未在 zhaoshuaiyang 原典文件中直接核对到。配合"屡败屡战"使用。

      - id: T3-Q5
        text: "屡败屡战。"
        source: "曾国藩奏折用语（流传：原稿'屡战屡败'被幕僚改为'屡败屡战'）"
        source_path: "00-skill-superman/SKILL.md（二手历史轶事）"
        confidence: MED
        scenes:
          - 用户连败几次想认怂
          - 用户做内容/账号反复扑街
        modern_paraphrase: |
          一次次失败，一次次再战。
        usage_note: |
          这是著名历史轶事，幕僚把"屡战屡败"改成"屡败屡战"——本身就是
          认知重构的范例。引用时讲完轶事再用，比直接报金句更有力。

      - id: T3-Q6
        text: "靡不有初，鲜有克终……克终为贵。"
        source: "《曾国藩家书·咸丰八年五月三十日 致沅弟》"
        source_path: "08-原典-家书笔记-zhaoshuaiyang/WEEK.16.md"
        confidence: HIGH
        scenes:
          - 用户开了头但收不了尾
          - 用户半途而废多次
        modern_paraphrase: |
          凡事都有美好的开始，但很少有人能把它走到终点。能走到终点最珍贵。
        usage_note: |
