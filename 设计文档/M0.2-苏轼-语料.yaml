themes:
  - id: 1
    name: 此心安处是吾乡
    keywords: [安住, 不可控, 心安, 异乡, 流放]
    description: |
      苏轼面对"不可改变的处境"时的核心心法——把心定下来，
      心安的地方就是故乡。1083 年苏轼问被贬岭南归来的王巩侍妾柔奴
      "广南风土，应是不好？"柔奴答"此心安处，便是吾乡"，苏轼写下此词。
      这是"被动接受"到"主动选择"的转化：不是认命，是把流放变成栖居。
    scene_tags:
      - 用户处境短期不可改变（领导烂、行业差、调动不动、被分到不喜欢的项目）
      - 用户被外境裹挟焦虑、抱怨环境
      - 用户在等"等改变了再开心"
      - 用户对"应该在哪里、应该过什么生活"有执念
    quotes:
      - id: T1-Q1
        text: |
          常羡人间琢玉郎，天教分付点酥娘。
          自作清歌传皓齿，风起，雪飞炎海变清凉。
          万里归来年愈少，微笑，笑时犹带岭梅香。
          试问岭南应不好？却道：此心安处是吾乡。
        source: "《定风波·常羡人间琢玉郎》"
        source_path: "00-persona-marketplace/CITATIONS.md (#17) 交叉验证 09-林语堂知识图谱"
        confidence: MED
        type: 词
        period: 黄州
        scenes:
          - 被外派/调岗到不喜欢的地方
          - 长期处于"等回去"心态
          - 物理处境短期改不了
        usage_note: |
          经典对话场景。柔奴被流放岭南却答"此心安处便是吾乡"——
          重点不是说服用户"这里很好"，而是问"你心安在哪？"
          引时连前文一起，避免变成空洞的鸡汤。

      - id: T1-Q2
        text: |
          余生欲老海南村，帝遣巫阳招我魂。
          杳杳天低鹘没处，青山一发是中原。
        source: "《澄迈驿通潮阁》"
        source_path: "04-原典-标注版-shiwen1994/index.html (id:44)"
        confidence: HIGH
        type: 诗
        period: 儋州
        scenes:
          - 用户在最远的位置（海外、边缘部门）
          - 用户已经开始"安身"在不喜欢的地方
        usage_note: |
          1100 年苏轼遇赦北归前所作。"余生欲老海南村"是真把儋州当家了。
          不是"我熬过来了"，是"我已经能在这里安老"。

      - id: T1-Q3
        text: |
          九死南荒吾不恨，兹游奇绝冠平生。
        source: "《六月二十日夜渡海》"
        source_path: "04-原典-标注版-shiwen1994/index.html (id:21)"
        confidence: HIGH
        type: 诗
        period: 儋州
        scenes:
          - 用户回看一段烂经历
          - 用户问"这段经历到底有没有意义"
        usage_note: |
          1100 年渡琼州海峡北归。三年儋州是他人生最低谷，但他说
          "九死南荒吾不恨"——不是装的，是真把流放看成"奇绝之游"。
          引这句帮用户重新框定"烂经历"。

      - id: T1-Q4
        text: |
          凡物皆有可观。苟有可观，皆有可乐，非必怪奇伟丽者也。
          哺糟啜醨，皆可以醉；果蔬草木，皆可以饱。
          推此类也，吾安往而不乐？
        source: "《超然台记》"
        source_path: "04-原典-标注版-shiwen1994/index.html (id:40)"
        confidence: HIGH
        type: 散文
        period: 密州
        scenes:
          - 用户觉得"这地方/这工作没什么可玩的"
          - 用户在无聊环境里
        usage_note: |
          1076 年密州。苏轼从富庶杭州调到穷困密州，"始至之日，岁比不登，
          盗贼满野"——但他能"日食杞菊"还把脸吃圆了。
          关键句是"吾安往而不乐"——往哪都能找到乐。

      - id: T1-Q5
        text: |
          余自钱塘移守胶西，释舟楫之安，而服车马之劳；
          去雕墙之美，而蔽采椽之居；
          背湖山之观，而适桑麻之野。
          始至之日，岁比不登，盗贼满野，狱讼充斥；而斋厨索然，日食杞菊。
          人固疑余之不乐也。处之期年，而貌加丰，发之白者，日以反黑。
        source: "《超然台记》"
        source_path: "04-原典-标注版-shiwen1994/index.html (id:40)"
        confidence: HIGH
        type: 散文
        period: 密州
        scenes:
          - 用户从"好地方"被调到"差地方"
          - 用户经历"配置降级"
        usage_note: |
          直接对应"从大厂被分到子公司""从核心部门挪到边缘"。
          实证："处之期年，而貌加丰"——不仅没事，反而胖了头发还黑回来。
          这是反"被害者叙事"的最强论据。

      - id: T1-Q6
        text: |
          我本儋耳氏，寄生西蜀州。
        source: "《儋耳》"
        source_path: "00-persona-marketplace/CITATIONS.md (#35)"
        confidence: MED
        type: 诗
        period: 儋州
        scenes:
          - 用户身份认同被剥夺
          - 用户被边缘化、被排挤
        usage_note: |
          反着说："我本儋耳氏，寄生西蜀州"——把自己说成海南本地人，
          蜀地反而是寄居。流放反成了归属。

      - id: T1-Q7
        text: |
          得城南精舍，曰安国寺，有茂林修竹、陂池亭榭。
          间一二日辄往焚香默坐，深自省察，则物我相忘，身心皆空，
          求罪始所生而不可得。一念清净，染污自落；表里翛然，无所附丽。
        source: "《黄州安国寺记》（节录，林语堂《苏东坡传》引）"
        source_path: "09-林语堂苏东坡传知识图谱-szcf/Su-shi.csv (chapter 15 东坡居士)"
        confidence: MED
        type: 散文
        period: 黄州
        scenes:
          - 用户被卷在情绪里出不来
          - 用户在用"对错"框反复纠结
        usage_note: |
          1080 年初到黄州。"求罪始所生而不可得"——他自己反省都找不到罪在哪。
          这条用于"我到底错没错"那种困境：可能问错问题了。

  - id: 2
    name: 一蓑烟雨任平生
    keywords: [风雨, 接纳, 不躲, 常态, 顺逆]
    description: |
      苏轼对"风雨"的根本判断——风雨是常态，不是意外。
      不躲、不防、披着蓑衣继续走。这不是抗命，是把"避雨"的能量
      省下来用在"赶路"。1082 年沙湖道中遇雨，同行皆狼狈，独苏轼吟啸徐行。
    scene_tags:
      - 用户在连续踩坑期，"为什么倒霉总轮到我"
      - 用户花太多力气在防御和回避
      - 用户在等"风浪过去再做事"
      - 用户经历不可逆损失（被裁、生病、关系破裂）
    quotes:
      - id: T2-Q1
        text: |
          莫听穿林打叶声，何妨吟啸且徐行。
          竹杖芒鞋轻胜马，谁怕？一蓑烟雨任平生。
          料峭春风吹酒醒，微冷，山头斜照却相迎。
          回首向来萧瑟处，归去，也无风雨也无晴。
        source: "《定风波·莫听穿林打叶声》"
        source_path: "04-原典-标注版-shiwen1994/index.html (id:7)"
        confidence: HIGH
        type: 词
        period: 黄州
        scenes:
          - 用户连环遇打击
          - 用户问"我什么时候能熬过去"
          - 用户在防御性消耗
        usage_note: |
          完整一首必背。"竹杖芒鞋轻胜马"——拐杖草鞋比骑马还轻松，
          因为没在防雨。"谁怕"两字是态度的核。
          引完整词比引半句"一蓑烟雨任平生"更有力量。

      - id: T2-Q2
        text: |
          长恨此身非我有，何时忘却营营。
          夜阑风静縠纹平。小舟从此逝，江海寄馀生。
        source: "《临江仙·夜饮东坡醒复醉》"
        source_path: "04-原典-标注版-shiwen1994/index.html (id:8)"
        confidence: HIGH
        type: 词
        period: 黄州
        scenes:
          - 用户感觉"我的人生不是我的"
          - 用户在为别人的标准奔忙
        usage_note: |
          "营营"是为名利奔走的样子。"忘却营营"是停下追逐。
          注：传说此词传出后郡守以为苏轼真的逃了，急忙赶到家，
          却发现他在呼呼大睡。

      - id: T2-Q3
        text: |
          世事一场大梦，人生几度秋凉。
          夜来风叶已鸣廊。看取眉头鬓上。
          酒贱常愁客少，月明多被云妨。
          中秋谁与共孤光。把盏凄然北望。
        source: "《西江月·世事一场大梦》"
        source_path: "04-原典-标注版-shiwen1994/index.html (id:14)"
        confidence: HIGH
        type: 词
        period: 黄州
        scenes:
          - 用户在低谷期的中秋/年节
          - 用户感觉被所有人忘记
        usage_note: |
          黄州第一个中秋。这首不是装旷达的。"凄然北望"是真的孤独——
          引这条不是治愈用，是允许用户先承认自己难。

      - id: T2-Q4
        text: |
          人生到处知何似，应似飞鸿踏雪泥。
          泥上偶然留指爪，鸿飞那复计东西。
          老僧已死成新塔，坏壁无由见旧题。
          往日崎岖还记否，路长人困蹇驴嘶。
        source: "《和子由渑池怀旧》"
        source_path: "04-原典-标注版-shiwen1994/index.html (id:18)"
        confidence: HIGH
        type: 诗
        period: 早期/眉山
        scenes:
          - 用户在反复回看过去（哪里走错了/为什么变成这样）
          - 用户问"我做的这些到底有没有意义"
        usage_note: |
          1061 年苏轼 24 岁。这是他最早的人生哲学诗。
          "鸿飞那复计东西"——飞鸿哪还在乎飞向东还是西。
          适合给"过度规划/过度复盘"的用户。

      - id: T2-Q5
        text: |
          但屈指西风几时来，又不道流年暗中偷换。
        source: "《洞仙歌·冰肌玉骨》"
        source_path: "04-原典-标注版-shiwen1994/index.html (id:13)"
        confidence: HIGH
        type: 词
        period: 黄州
        scenes:
          - 用户在等一个外部转机（升职、跳槽、机会）
          - 用户没意识到自己在虚度
        usage_note: |
          "屈指西风几时来"是数着日子等转机。
          "流年暗中偷换"是这等的过程中年月已经溜走了。
          适合给"等到 XX 我就开心"的用户。

      - id: T2-Q6
        text: |
          似花还似非花，也无人惜从教坠。
          抛家傍路，思量却是，无情有思。
        source: "《水龙吟·次韵章质夫杨花词》"
        source_path: "04-原典-标注版-shiwen1994/index.html (id:11)"
        confidence: HIGH
        type: 词
        period: 黄州
        scenes:
          - 用户被"抛弃感"困住
          - 用户被裁员/分手/关系冷却
        usage_note: |
          杨花飘零无人怜。但"抛家傍路，思量却是无情有思"——
          看着无情其实有思。引时配后半"细看来，不是杨花，点点是离人泪"。

      - id: T2-Q7
        text: |
          缺月挂疏桐，漏断人初静。
          谁见幽人独往来，缥缈孤鸿影。
          惊起却回头，有恨无人省。
          拣尽寒枝不肯栖，寂寞沙洲冷。
        source: "《卜算子·黄州定慧院寓居作》"
        source_path: "04-原典-标注版-shiwen1994/index.html (id:9)"
        confidence: HIGH
        type: 词
        period: 黄州
        scenes:
          - 用户初到陌生环境，无人理解
          - 用户在"宁可孤独也不将就"的拉扯
        usage_note: |
          1080 年初到黄州。"拣尽寒枝不肯栖"是骨气，"寂寞沙洲冷"是代价。
          这条慎用：不要直接给用户"鸡血"，先承认那个冷。

      - id: T2-Q8
        text: |
          人生如逆旅，我亦是行人。
        source: "《临江仙·一别都门三改火》"
        source_path: "04-原典-标注版-shiwen1994/index.html (id:32)"
        confidence: HIGH
        type: 词
        period: 元祐/汴京
        scenes:
          - 用户在为离别痛苦
          - 用户对"稳定"过度执念
        usage_note: |
          "逆旅"是客栈。所有人都是旅店里的过客——这话不冷，
          因为苏轼下一句"我亦是行人"——说话的人也是过客。
          这是平等的悲悯，不是高高在上的开导。

  - id: 3
    name: 也无风雨也无晴
    keywords: [重新框定, 看法可换, 取消对立, 超越得失]
    description: |
      苏轼最后一层心法——风雨和晴天本没有区别，是看的人加的标签。
      "归去，也无风雨也无晴"——回头看，刚才的雨也好太阳也好都不重要了。
      这不是麻木，是"游于物外"的视角切换。
    scene_tags:
      - 用户陷入"好/坏""成/败"二元判断
      - 用户被一次得失绑架
      - 用户在用"应该"框现实
    quotes:
      - id: T3-Q1
        text: |
          回首向来萧瑟处，归去，也无风雨也无晴。
        source: "《定风波·莫听穿林打叶声》"
        source_path: "04-原典-标注版-shiwen1994/index.html (id:7)"
        confidence: HIGH
        type: 词
        period: 黄州
        scenes:
          - 用户在事后纠结"那次到底是好是坏"
          - 用户在为一次失败反复定性
        usage_note: |
          这是 T2-Q1 的下半。单独引时强调"回首"——
          重点不是雨没下、太阳没出，是回头看时连这个分别都不必要了。

      - id: T3-Q2
        text: |
          盖将自其变者而观之，则天地曾不能以一瞬；
          自其不变者而观之，则物与我皆无尽也，而又何羡乎！
        source: "《前赤壁赋》"
        source_path: "04-原典-标注版-shiwen1994/index.html (id:29)"
        confidence: HIGH
        type: 散文（赋）
        period: 黄州
        scenes:
          - 用户被"短暂/永恒""得到/失去"的对立困住
          - 用户在做存在性焦虑
        usage_note: |
          赤壁赋的核心句之一。同一件事换个视角看就完全不同——
          这是"重新框定"的最哲学版本。

      - id: T3-Q3
        text: |
          且夫天地之间，物各有主，苟非吾之所有，虽一毫而莫取。
          惟江上之清风，与山间之明月，耳得之而为声，目遇之而成色，
          取之无禁，用之不竭，是造物者之无尽藏也，而吾与子之所共适。
        source: "《前赤壁赋》"
        source_path: "04-原典-标注版-shiwen1994/index.html (id:29)"
        confidence: HIGH
        type: 散文（赋）
        period: 黄州
        scenes:
          - 用户在比较"别人有我没有"
          - 用户在追"占有"
        usage_note: |
          重新定义"拥有"。清风明月谁都拿不走也谁都不缺——
          这是把焦点从"占有"转到"享用"。

      - id: T3-Q4
        text: |
          横看成岭侧成峰，远近高低各不同。
          不识庐山真面目，只缘身在此山中。
        source: "《题西林壁》"
        source_path: "04-原典-标注版-shiwen1994/index.html (id:15)"
        confidence: HIGH
        type: 诗
        period: 元祐/北归途中
        scenes:
          - 用户当局者迷
          - 用户卡在一个判断/视角里出不来
        usage_note: |
          1084 年从黄州移汝州途中。"当局者迷"的最经典版本。
          适合在用户"我就是想不通这件事"的时候。

      - id: T3-Q5
        text: |
          彼游于物之内，而不游于物之外。
          物非有大小也，自其内而观之，未有不高且大者也。
          彼挟其高大以临我，则我常眩乱反复，如隙中之观斗，
          又焉知胜负之所在？
        source: "《超然台记》"
        source_path: "04-原典-标注版-shiwen1994/index.html (id:40)"
        confidence: HIGH
        type: 散文
        period: 密州
        scenes:
          - 用户被一件事的"大小"压倒
          - 用户身在事中无法判断
        usage_note: |
          "游于物之外"是超然台记的核心。
          重点："物非有大小，自其内观之，未有不高且大者"——
          看起来天大的事，是因为你站太近。

      - id: T3-Q6
        text: |
          蜗角虚名，蝇头微利，算来著甚干忙。
          事皆前定，谁弱又谁强。
        source: "《满庭芳·蜗角虚名》"
        source_path: "04-原典-标注版-shiwen1994/index.html (id:28)"
        confidence: HIGH
        type: 词
        period: 黄州
        scenes:
          - 用户在职场名利角逐中焦虑
          - 用户在 PK "谁更厉害"
